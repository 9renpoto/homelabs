services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    ports: ["3000:3000"]
    environment:
      - OLLAMA_API_KEY=ollama-local
    volumes:
      - type: bind
        source: ./data
        target: /data
      - type: bind
        source: ./state/openclaw
        target: /home/node/.openclaw
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      openclaw-init:
        condition: service_completed_successfully
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - type: bind
        source: ./state/ollama
        target: /root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        OLLAMA_HOST=http://ollama:11434 ollama pull qwen2.5:0.5b
    restart: "no"

  openclaw-init:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        openclaw config set models.providers.ollama.apiKey ollama-local &&
        openclaw config set models.providers.ollama.baseUrl http://ollama:11434 &&
        openclaw config set models.providers.ollama.api ollama &&
        openclaw config set agents.defaults.model.primary ollama/qwen2.5:0.5b &&
        openclaw config set agents.defaults.bootstrapMaxChars 3000 &&
        openclaw config set agents.defaults.bootstrapTotalMaxChars 12000
    volumes:
      - type: bind
        source: ./state/openclaw
        target: /home/node/.openclaw
    restart: "no"
