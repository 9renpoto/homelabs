apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-bootstrap
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/9renpoto/homelabs.git
    targetRevision: main
    path: gitops/argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
