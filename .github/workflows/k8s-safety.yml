name: Kubernetes safety

on:
  pull_request:
    paths:
      - "k8s/**"
      - "gitops/**"
      - "policy/kubernetes/**"
      - ".github/workflows/k8s-safety.yml"
  push:
    branches:
      - main
    paths:
      - "k8s/**"
      - "gitops/**"
      - "policy/kubernetes/**"
      - ".github/workflows/k8s-safety.yml"

permissions:
  contents: read

jobs:
  validate-openclaw-core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Render kustomize manifests
        run: |
          mkdir -p .tmp
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            registry.k8s.io/kubectl:v1.31.0 \
            kustomize k8s/openclaw-core/base > .tmp/openclaw-core.rendered.yaml
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            registry.k8s.io/kubectl:v1.31.0 \
            kustomize gitops/argocd > .tmp/argocd-bootstrap.rendered.yaml
          test -s .tmp/openclaw-core.rendered.yaml
          test -s .tmp/argocd-bootstrap.rendered.yaml

      - name: Validate rendered manifests against Kubernetes schemas
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ghcr.io/yannh/kubeconform:v0.6.7 \
            -strict \
            -summary \
            -ignore-missing-schemas \
            .tmp/openclaw-core.rendered.yaml \
            .tmp/argocd-bootstrap.rendered.yaml

      - name: Enforce Kubernetes safety policies
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            openpolicyagent/conftest:v0.58.0 \
            test \
            --policy policy/kubernetes \
            .tmp/openclaw-core.rendered.yaml \
            .tmp/argocd-bootstrap.rendered.yaml \
            gitops/argocd/applications/openclaw-bootstrap.yaml
