name: Packer template validation

on:
  pull_request:
    paths:
      - "infra/packer/**"
      - ".github/workflows/packer-validate.yaml"
  push:
    branches:
      - main
    paths:
      - "infra/packer/**"
      - ".github/workflows/packer-validate.yaml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Packer
        uses: hashicorp/setup-packer@1aa358be5cf73883762b302a3a03abd66e75b232 # v3.1.0
        with:
          version: "latest"

      - name: Packer init
        run: packer init infra/packer/openclaw-k3s.pkr.hcl

      - name: Packer validate
        run: packer validate -syntax-only infra/packer/openclaw-k3s.pkr.hcl
