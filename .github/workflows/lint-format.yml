name: Lint and format

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  biome:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: biomejs/setup-biome@v2
        with:
          version: 2.4.10
      - name: Check with Biome
        run: biome ci .

  super-linter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Lint repository
        uses: super-linter/super-linter@v8.3.1
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_BASH: true
