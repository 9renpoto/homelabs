name: Ansible safety

on:
  pull_request:
    paths:
      - "ansible/**"
      - ".github/workflows/ansible-safety.yaml"
  push:
    branches:
      - main
    paths:
      - "ansible/**"
      - ".github/workflows/ansible-safety.yaml"

permissions:
  contents: read

jobs:
  syntax-check:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.6.1
        with:
          python-version: "3.12"
      - name: Install ansible-core
        run: python -m pip install --disable-pip-version-check ansible-core==2.18.7
      - name: Syntax-check Ansible playbooks
        working-directory: ansible
        run: |
          echo "No playbooks to syntax-check yet (bootstrap playbook pending)"

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.6.1
        with:
          python-version: "3.12"
      - name: Install ansible-lint
        run: pip install ansible-lint
      - name: Run ansible-lint
        working-directory: ansible
        run: ansible-lint
