name: Hyper-V script tests

on:
  pull_request:
    paths:
      - "infra/hyperv/**"
      - ".github/workflows/hyperv-tests.yaml"
  push:
    branches:
      - main
    paths:
      - "infra/hyperv/**"
      - ".github/workflows/hyperv-tests.yaml"

permissions:
  contents: read

jobs:
  pester:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run Hyper-V script tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./infra/hyperv/ -CI
