pre-commit:
  commands:
    gitleaks:
      run: gitleaks git --pre-commit --staged --no-banner .
    typos:
      run: typos
    ansible-lint:
      glob: "ansible/**/*.{yml,yaml}"
      run: ansible-lint --project-dir ansible/ {staged_files}
    conftest:
      glob: "(k8s|gitops)/**/*.yaml"
      run: conftest test --policy policy/kubernetes {staged_files}
