#cloud-config
hostname: openclaw-k3s
manage_etc_hosts: true

users:
  - name: openclaw
    gecos: OpenClaw Operator
    groups:
      - sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 REPLACE_WITH_YOUR_PUBLIC_KEY

package_update: true
package_upgrade: true
packages:
  - curl
  - git
  - qemu-guest-agent
  - ufw

write_files:
  - path: /etc/sysctl.d/99-k3s.conf
    permissions: "0644"
    content: |
      vm.max_map_count=262144

runcmd:
  - systemctl enable --now qemu-guest-agent
  - sysctl --system
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow OpenSSH
  - ufw --force enable

final_message: "openclaw-k3s cloud-init finished"
