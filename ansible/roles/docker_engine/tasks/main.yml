---
- name: Ensure docker.io package repository is available
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
    state: present
    filename: docker
  become: true

- name: Ensure docker keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Add Docker GPG key
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
    executable: /bin/bash
  become: true

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install Docker Engine, CLI, Compose, and containerd
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
  become: true
  notify: Start docker

- name: Ensure docker group exists
  ansible.builtin.group:
    name: "{{ docker_group }}"
    state: present
  become: true

- name: Ensure docker service is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: true
  become: true
  when: docker_enable_service

- name: Verify docker socket accessibility
  ansible.builtin.wait_for:
    path: "{{ docker_socketpath }}"
    state: present
    timeout: 10
  become: true

- name: Test docker command
  ansible.builtin.command:
    cmd: docker ps
  register: docker_test
  changed_when: false
  become: true
