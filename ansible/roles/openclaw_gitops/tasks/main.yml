---
- name: Ensure bootstrap manifest exists
  ansible.builtin.stat:
    path: "{{ openclaw_bootstrap_manifest_path }}"
  register: openclaw_bootstrap_manifest

- name: Require bootstrap manifest
  ansible.builtin.assert:
    that:
      - openclaw_bootstrap_manifest.stat.exists
    fail_msg: "Bootstrap manifest not found at {{ openclaw_bootstrap_manifest_path }}."

- name: Wait for ArgoCD Application CRD
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - --for=condition=Established
      - --timeout=120s
      - crd/applications.argoproj.io
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: false

- name: Wait for ArgoCD AppProject CRD
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - --for=condition=Established
      - --timeout=120s
      - crd/appprojects.argoproj.io
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: false

- name: Apply ArgoCD bootstrap application
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - "{{ argocd_namespace }}"
      - apply
      - -f
      - "{{ openclaw_bootstrap_manifest_path }}"
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  register: openclaw_bootstrap_apply
  changed_when: "'created' in openclaw_bootstrap_apply.stdout or 'configured' in openclaw_bootstrap_apply.stdout"

- name: Wait for bootstrap application to become Synced and Healthy
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - "{{ argocd_namespace }}"
      - get
      - application
      - openclaw-bootstrap
      - -o
      - jsonpath={.status.sync.status}:{.status.health.status}
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  register: openclaw_bootstrap_status
  until: openclaw_bootstrap_status.stdout == "Synced:Healthy"
  retries: "{{ openclaw_gitops_wait_retries }}"
  delay: "{{ openclaw_gitops_wait_delay }}"
  changed_when: false

- name: Wait for expected ArgoCD applications to exist
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - "{{ argocd_namespace }}"
      - get
      - application
      - "{{ item }}"
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  register: openclaw_gitops_apps_exist
  until: openclaw_gitops_apps_exist.rc == 0
  retries: "{{ openclaw_gitops_wait_retries }}"
  delay: "{{ openclaw_gitops_wait_delay }}"
  changed_when: false
  loop:
    - openclaw-bootstrap
    - nvidia-device-plugin
    - openclaw-core

- name: Wait for expected ArgoCD applications to become Synced and Healthy
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - "{{ argocd_namespace }}"
      - get
      - application
      - "{{ item }}"
      - -o
      - jsonpath={.status.sync.status}:{.status.health.status}
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  register: openclaw_gitops_apps_healthy
  until: openclaw_gitops_apps_healthy.stdout == "Synced:Healthy"
  retries: "{{ openclaw_gitops_wait_retries }}"
  delay: "{{ openclaw_gitops_wait_delay }}"
  changed_when: false
  loop:
    - openclaw-bootstrap
    - nvidia-device-plugin
    - openclaw-core
