---
- name: Ensure NVIDIA GPG key directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Add NVIDIA Container Toolkit GPG key
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -fsSL {{ nvidia_container_toolkit_gpg_key }} | gpg --dearmor -o /etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg
  args:
    creates: /etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg
    executable: /bin/bash
  become: true

- name: Add NVIDIA Container Toolkit APT repository
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -s -L {{ nvidia_container_toolkit_gpg_key }} | apt-key add - && \
      curl -s -L https://nvidia.github.io/libnvidia-container/ubuntu{{ ansible_lsb.major_version }}.{{ ansible_lsb.minor_version }}/libnvidia-container.list | \
      sed 's#deb https://#deb [signed-by=/etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
      tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  args:
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list
    executable: /bin/bash
  become: true

- name: Update apt cache after adding NVIDIA repo
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name:
      - nvidia-container-toolkit
      - nvidia-container-runtime
    state: present
  become: true

- name: Ensure Docker daemon config directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: '0755'
  become: true

- name: Configure Docker daemon to use NVIDIA runtime
  ansible.builtin.copy:
    content: |
      {
        "runtimes": {
          "nvidia": {
            "path": "nvidia-container-runtime",
            "runtimeArgs": []
          }
        },
        "default-runtime": "nvidia"
      }
    dest: "{{ nvidia_docker_daemon_config_path }}"
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Restart docker

- name: Flush handlers to apply docker config changes
  ansible.builtin.meta: flush_handlers

- name: Wait for Docker daemon to restart
  ansible.builtin.wait_for:
    timeout: 5

- name: Verify NVIDIA runtime is configured
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      docker info | grep -i nvidia || echo "nvidia"
  register: nvidia_config_check
  changed_when: false
  become: true

- name: Test GPU visibility in Docker
  ansible.builtin.shell:
    cmd: docker run --rm --gpus all nvidia/cuda:12.4.1-runtime-ubuntu24.04 nvidia-smi
  register: gpu_test
  changed_when: false
  become: true
  failed_when: false
