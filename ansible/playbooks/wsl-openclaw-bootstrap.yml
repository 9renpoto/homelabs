---
- name: Bootstrap OpenClaw on WSL k3s
  hosts: wsl
  become: true
  gather_facts: true
  vars:
    operator_user: "{{ lookup('ansible.builtin.env', 'USER') }}"
    secret_source_dir: /etc/openclaw/openclaw-core-secret
    repo_root: "{{ playbook_dir | dirname | dirname }}"
  roles:
    - k3s_server
    - nvidia_k3s_runtime
    - argocd
  tasks:
    - name: Check local secret directory
      ansible.builtin.stat:
        path: "{{ secret_source_dir }}"
      register: openclaw_secret_dir

    - name: Apply OpenClaw secret when local secret directory exists
      ansible.builtin.include_role:
        name: openclaw_secret
      vars:
        openclaw_secret_dir_path: "{{ secret_source_dir }}"
      when: openclaw_secret_dir.stat.isdir | default(false)

    - name: Note missing local secret directory
      ansible.builtin.debug:
        msg: "Skipping OpenClaw secret apply because {{ secret_source_dir }} is not present."
      when: not openclaw_secret_dir.stat.isdir | default(false)

    - name: Bootstrap ArgoCD applications
      ansible.builtin.include_role:
        name: openclaw_gitops
