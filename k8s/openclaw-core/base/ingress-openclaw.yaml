apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/part-of: openclaw
spec:
  ingressClassName: traefik
  rules:
    - host: openclaw.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openclaw
                port:
                  name: http
