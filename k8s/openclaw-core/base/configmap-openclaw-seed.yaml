apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-seed
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/part-of: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local"
      },
      "models": {
        "providers": {
          "ollama": {
            "baseUrl": "http://ollama:11434",
            "api": "ollama",
            "apiKey": "ollama-local",
            "models": [
              {
                "id": "qwen2.5-coder:7b",
                "name": "Qwen 2.5 Coder 7B",
                "reasoning": false,
                "input": ["text"],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 32768,
                "maxTokens": 8192
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "ollama/qwen2.5-coder:7b"
          },
          "models": {
            "ollama/qwen2.5-coder:7b": {
              "alias": "Qwen 2.5 Coder 7B"
            }
          },
          "bootstrapMaxChars": 1024,
          "bootstrapTotalMaxChars": 4096,
          "maxConcurrent": 1,
          "subagents": {
            "maxConcurrent": 1
          }
        }
      },
      "channels": {
        "discord": {
          "enabled": false
        }
      }
    }
