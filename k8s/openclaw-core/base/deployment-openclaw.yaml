apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/part-of: openclaw
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/part-of: openclaw
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: bootstrap-openclaw-home
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              mkdir -p /work
              if [ ! -f /work/openclaw.json ]; then
                cp /seed/openclaw.json /work/openclaw.json
              elif ! grep -q '"mode"[[:space:]]*:[[:space:]]*"local"' /work/openclaw.json; then
                tmp_file="$(mktemp /work/openclaw.json.XXXXXX)"
                awk '
                  NR == 1 {
                    print
                    print "  \"gateway\": {"
                    print "    \"mode\": \"local\""
                    print "  },"
                    next
                  }
                  { print }
                ' /work/openclaw.json > "$tmp_file"
                mv "$tmp_file" /work/openclaw.json
              fi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: openclaw-home
              mountPath: /work
            - name: openclaw-seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.13-1
          imagePullPolicy: IfNotPresent
          args:
            - node
            - openclaw.mjs
            - gateway
            - --bind
            - lan
            - --port
            - "3000"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          envFrom:
            - secretRef:
                name: openclaw-core-env
                optional: true
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: openclaw-tmp
              mountPath: /tmp
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home
        - name: openclaw-seed
          configMap:
            name: openclaw-seed
        - name: openclaw-tmp
          emptyDir: {}
